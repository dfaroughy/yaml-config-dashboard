<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src {{CSP_SOURCE}} https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'nonce-{{NONCE}}';">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YAML Config Dashboard</title>
  <link rel="stylesheet" href="{{CSS_URI}}">
</head>
<body>
  <header>
    <div class="header-left">
      <h1>YAML Config Dashboard</h1>
      <span class="project-badge" id="project-badge"></span>
    </div>
    <div class="header-right">
      <input type="search" id="search" placeholder="Filter parameters..." autocomplete="off">
      <span class="shortcut-hint"><kbd id="mod-key">Ctrl</kbd>+<kbd>S</kbd> save</span>
      <button class="btn" id="reset-btn" disabled>Reset</button>
      <button class="btn btn-primary" id="save-btn" disabled>
        <span class="btn-save-indicator">Save</span>
      </button>
      <button class="btn-icon" id="settings-btn" title="Settings">&#9881;</button>
    </div>
  </header>

  <div id="settings-overlay"></div>
  <div id="settings-panel">
    <div class="sp-header">
      <h2>Settings</h2>
      <button class="sp-close">&times;</button>
    </div>

    <div class="sp-section">
      <div class="sp-section-title">Theme</div>
      <div class="sp-themes" id="theme-swatches"></div>
    </div>

    <div class="sp-section">
      <div class="sp-section-title">Fonts</div>
      <div class="sp-row">
        <span class="sp-label">Labels</span>
        <select class="sp-select" id="set-label-font">
          <option value="'Major Mono Display', monospace">Major Mono</option>
          <option value="'Share Tech Mono', monospace">Share Tech Mono</option>
          <option value="'VT323', monospace">VT323</option>
          <option value="'Press Start 2P', monospace">Press Start 2P</option>
          <option value="'Silkscreen', monospace">Silkscreen</option>
          <option value="'Orbitron', sans-serif">Orbitron</option>
          <option value="'Space Mono', monospace">Space Mono</option>
          <option value="'Fira Code', monospace">Fira Code</option>
          <option value="'JetBrains Mono', monospace">JetBrains Mono</option>
          <option value="'IBM Plex Mono', monospace">IBM Plex Mono</option>
          <option value="'Courier New', Courier, monospace">Courier New</option>
          <option value="-apple-system, sans-serif">System Sans</option>
        </select>
      </div>
      <div class="sp-row">
        <span class="sp-label">Fields</span>
        <select class="sp-select" id="set-field-font">
          <option value="'Major Mono Display', monospace">Major Mono</option>
          <option value="'Share Tech Mono', monospace">Share Tech Mono</option>
          <option value="'VT323', monospace">VT323</option>
          <option value="'Press Start 2P', monospace">Press Start 2P</option>
          <option value="'Silkscreen', monospace">Silkscreen</option>
          <option value="'Orbitron', sans-serif">Orbitron</option>
          <option value="'Space Mono', monospace">Space Mono</option>
          <option value="'Fira Code', monospace">Fira Code</option>
          <option value="'JetBrains Mono', monospace">JetBrains Mono</option>
          <option value="'IBM Plex Mono', monospace">IBM Plex Mono</option>
          <option value="'Courier New', Courier, monospace">Courier New</option>
          <option value="-apple-system, sans-serif">System Sans</option>
        </select>
      </div>
      <div class="sp-row">
        <span class="sp-label">Values</span>
        <select class="sp-select" id="set-value-font">
          <option value="'JetBrains Mono', monospace">JetBrains Mono</option>
          <option value="'Fira Code', monospace">Fira Code</option>
          <option value="'IBM Plex Mono', monospace">IBM Plex Mono</option>
          <option value="'Space Mono', monospace">Space Mono</option>
          <option value="'Share Tech Mono', monospace">Share Tech Mono</option>
          <option value="'VT323', monospace">VT323</option>
          <option value="'Silkscreen', monospace">Silkscreen</option>
          <option value="'Orbitron', sans-serif">Orbitron</option>
          <option value="'Courier New', Courier, monospace">Courier New</option>
        </select>
      </div>
      <div class="sp-row">
        <span class="sp-label">Size</span>
        <input type="range" class="sp-range" id="set-font-size" min="10" max="18" step="1" value="13">
        <span class="sp-range-val" id="font-size-val">13</span>
      </div>
    </div>

    <div class="sp-section">
      <div class="sp-section-title">Colors</div>
      <div class="sp-row">
        <span class="sp-label">Label color</span>
        <input type="color" class="sp-color" id="set-label-color" value="#c9d1d9">
      </div>
      <div class="sp-row">
        <span class="sp-label">Field color</span>
        <input type="color" class="sp-color" id="set-field-color" value="#8b949e">
      </div>
      <div class="sp-row">
        <span class="sp-label">Accent color</span>
        <input type="color" class="sp-color" id="set-accent-color" value="#58a6ff">
      </div>
    </div>

    <div class="sp-section">
      <div class="sp-section-title">Layout</div>
      <div class="sp-row">
        <span class="sp-label">Density</span>
        <select class="sp-select" id="set-density">
          <option value="compact">Compact</option>
          <option value="comfortable" selected>Comfortable</option>
          <option value="spacious">Spacious</option>
        </select>
      </div>
      <div class="sp-toggle-row">
        <span class="sp-label">Type badges</span>
        <label class="toggle">
          <input type="checkbox" id="set-badges" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="sp-toggle-row">
        <span class="sp-label">Section counts</span>
        <label class="toggle">
          <input type="checkbox" id="set-counts" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>

    <div class="sp-section">
      <div class="sp-section-title">Behavior</div>
      <div class="sp-toggle-row">
        <span class="sp-label">Auto-expand all sections</span>
        <label class="toggle">
          <input type="checkbox" id="set-autoexpand">
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="sp-toggle-row">
        <span class="sp-label">Sort keys alphabetically</span>
        <label class="toggle">
          <input type="checkbox" id="set-sortkeys">
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>

    <div class="sp-section">
      <div class="sp-section-title">Export</div>
      <button class="sp-export-btn" id="export-cli">
        <span class="export-icon">&#9654;</span> Copy as CLI args
      </button>
      <button class="sp-export-btn" id="export-json">
        <span class="export-icon">{}</span> Copy as flat JSON
      </button>
      <button class="sp-export-btn" id="export-env">
        <span class="export-icon">$</span> Copy as env vars
      </button>
    </div>
  </div>

  <nav id="file-tabs"></nav>

  <main id="config-editor">
    <div class="empty-state">
      <div class="icon">&#9881;</div>
      <p>Loading configs...</p>
    </div>
  </main>

  <div id="toast-container"></div>

  <script nonce="{{NONCE}}" src="{{YAML_URI}}"></script>
  <script nonce="{{NONCE}}" src="{{JS_URI}}"></script>
</body>
</html>
